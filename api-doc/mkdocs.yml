site_name: PyArchInit API Reference
site_description: >-
  API reference for PyArchInit, the QGIS plugin for archaeological data
  management. Auto-generated from source-tree docstrings.
site_author: pyarchinit team
site_url: https://pyarchinit.readthedocs.io/
copyright: Copyright &copy; 2026 pyarchinit team — GPL v2

repo_name: pyarchinit/pyarchinit
repo_url: https://github.com/pyarchinit/pyarchinit
edit_uri: edit/Stratigraph_00001/api-doc/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  logo: assets/logo.png
  favicon: assets/favicon.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - content.tooltips
    - announce.dismiss

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/pyarchinit/pyarchinit
    - icon: fontawesome/solid/globe
      link: https://www.pyarchinit.org/
  generator: false
  version:
    provider: mike
    default: stable

extra_css:
  - assets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
      toc_depth: 4
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols

plugins:
  - search:
      lang:
        - en
        - it
  - glightbox

