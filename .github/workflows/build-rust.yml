name: Build Rust Core Module

on:
  push:
    paths:
      - '_rust_core/**'
    tags:
      - 'rust-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            artifact_name: linux-x86_64
          - os: windows-latest
            target: x86_64
            artifact_name: windows-x86_64
          - os: macos-latest
            target: x86_64
            artifact_name: macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Build wheel with maturin
        uses: PyO3/maturin-action@v1
        with:
          working-directory: _rust_core
          target: ${{ matrix.target }}
          args: --release --out dist --features pyo3/abi3-py39

      - name: Extract .so/.pyd from wheel
        shell: bash
        run: |
          mkdir -p extracted
          cd _rust_core/dist
          for whl in *.whl; do
            unzip -o "$whl" "pyarchinit_core/*.so" "pyarchinit_core/*.pyd" "pyarchinit_core/*.dylib" -d ../../extracted/ || true
          done
          # Move the binary to a flat name with platform suffix
          cd ../../extracted
          find . -name "*.so" -o -name "*.pyd" -o -name "*.dylib" | while read f; do
            cp "$f" "../_rust_binaries/$(basename $f)"
          done

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.artifact_name }}
          path: _rust_core/dist/*.whl

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.artifact_name }}
          path: extracted/pyarchinit_core/

  package:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: rust-binaries/

      - name: Organize binaries for plugin
        run: |
          mkdir -p _rust_binaries
          echo "=== Downloaded binaries ==="
          find rust-binaries/ -type f | sort

          # Copy each platform binary with descriptive name
          # Linux x86_64
          find rust-binaries/binary-linux-x86_64/ -name "*.so" -exec cp {} _rust_binaries/pyarchinit_core.linux-x86_64.so \; 2>/dev/null || true
          # Windows x86_64
          find rust-binaries/binary-windows-x86_64/ -name "*.pyd" -exec cp {} _rust_binaries/pyarchinit_core.windows-x86_64.pyd \; 2>/dev/null || true
          # macOS x86_64
          find rust-binaries/binary-macos-x86_64/ -name "*.so" -exec cp {} _rust_binaries/pyarchinit_core.macos-x86_64.so \; 2>/dev/null || true
          find rust-binaries/binary-macos-x86_64/ -name "*.dylib" -exec cp {} _rust_binaries/pyarchinit_core.macos-x86_64.dylib \; 2>/dev/null || true
          # macOS ARM64
          find rust-binaries/binary-macos-arm64/ -name "*.so" -exec cp {} _rust_binaries/pyarchinit_core.macos-arm64.so \; 2>/dev/null || true
          find rust-binaries/binary-macos-arm64/ -name "*.dylib" -exec cp {} _rust_binaries/pyarchinit_core.macos-arm64.dylib \; 2>/dev/null || true

          echo "=== Organized binaries ==="
          ls -la _rust_binaries/

      - name: Upload packaged binaries
        uses: actions/upload-artifact@v4
        with:
          name: rust-binaries-all-platforms
          path: _rust_binaries/

  release:
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist

      - name: Download packaged binaries
        uses: actions/download-artifact@v4
        with:
          name: rust-binaries-all-platforms
          path: binaries

      - uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.whl
            binaries/*
          body: |
            ## Rust Core Module Binaries

            Pre-compiled `pyarchinit_core` for all platforms.

            ### Installation
            Download the file for your platform and place it in the pyArchInit plugin directory:
            - **Linux x86_64**: `pyarchinit_core.linux-x86_64.so` → rename to `pyarchinit_core.abi3.so`
            - **Windows x86_64**: `pyarchinit_core.windows-x86_64.pyd` → rename to `pyarchinit_core.pyd`
            - **macOS Intel**: `pyarchinit_core.macos-x86_64.so` → rename to `pyarchinit_core.abi3.so`
            - **macOS Apple Silicon**: `pyarchinit_core.macos-arm64.so` → rename to `pyarchinit_core.abi3.so`
