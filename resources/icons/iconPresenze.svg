<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="clock_face" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#E8EAF6"/>
    </linearGradient>
    <linearGradient id="clock_rim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8A65"/>
      <stop offset="50%" style="stop-color:#E64A19"/>
      <stop offset="100%" style="stop-color:#BF360C"/>
    </linearGradient>
    <linearGradient id="calendar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8E1"/>
      <stop offset="100%" style="stop-color:#FFE082"/>
    </linearGradient>
    <linearGradient id="cal_header" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EF5350"/>
      <stop offset="100%" style="stop-color:#C62828"/>
    </linearGradient>
    <linearGradient id="checkmark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#66BB6A"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#00000040"/>
    </filter>
  </defs>

  <!-- Ground -->
  <ellipse cx="128" cy="232" rx="100" ry="15" fill="#D7CCC8" opacity="0.5"/>

  <!-- Clock -->
  <g filter="url(#shadow)">
    <!-- Clock body -->
    <circle cx="105" cy="100" r="68" fill="url(#clock_rim)"/>
    <circle cx="105" cy="100" r="58" fill="url(#clock_face)"/>

    <!-- Hour markers -->
    <circle cx="105" cy="50" r="4" fill="#BF360C"/>
    <circle cx="155" cy="100" r="4" fill="#BF360C"/>
    <circle cx="105" cy="150" r="4" fill="#BF360C"/>
    <circle cx="55" cy="100" r="4" fill="#BF360C"/>
    <!-- Small markers -->
    <circle cx="130" cy="57" r="2.5" fill="#E64A19"/>
    <circle cx="148" cy="75" r="2.5" fill="#E64A19"/>
    <circle cx="148" cy="125" r="2.5" fill="#E64A19"/>
    <circle cx="130" cy="143" r="2.5" fill="#E64A19"/>
    <circle cx="80" cy="143" r="2.5" fill="#E64A19"/>
    <circle cx="62" cy="125" r="2.5" fill="#E64A19"/>
    <circle cx="62" cy="75" r="2.5" fill="#E64A19"/>
    <circle cx="80" cy="57" r="2.5" fill="#E64A19"/>

    <!-- Hour hand -->
    <line x1="105" y1="100" x2="105" y2="68" stroke="#37474F" stroke-width="5" stroke-linecap="round"/>
    <!-- Minute hand -->
    <line x1="105" y1="100" x2="135" y2="82" stroke="#37474F" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Center dot -->
    <circle cx="105" cy="100" r="5" fill="#FF5722"/>
    <circle cx="105" cy="100" r="2.5" fill="#FFE0B2"/>
  </g>

  <!-- Calendar snippet (bottom-right) -->
  <g filter="url(#shadow)" transform="translate(135, 135)">
    <rect x="0" y="0" width="80" height="85" rx="8" fill="url(#calendar)" stroke="#FFB300" stroke-width="2"/>
    <!-- Calendar header -->
    <rect x="0" y="0" width="80" height="22" rx="8" fill="url(#cal_header)"/>
    <rect x="0" y="12" width="80" height="10" fill="url(#cal_header)"/>
    <!-- Calendar rings -->
    <rect x="20" y="-4" width="6" height="12" rx="3" fill="#757575"/>
    <rect x="54" y="-4" width="6" height="12" rx="3" fill="#757575"/>
    <!-- Calendar text -->
    <text x="40" y="16" text-anchor="middle" fill="white" font-size="11" font-weight="bold" font-family="Arial">FEB</text>
    <!-- Day grid -->
    <g fill="#5D4037" font-size="9" font-family="Arial" text-anchor="middle">
      <text x="16" y="40">L</text><text x="30" y="40">M</text><text x="44" y="40">M</text><text x="58" y="40">G</text><text x="70" y="40">V</text>
      <text x="16" y="54">1</text><text x="30" y="54">2</text><text x="44" y="54">3</text><text x="58" y="54">4</text><text x="70" y="54">5</text>
      <text x="16" y="68">8</text><text x="30" y="68">9</text><text x="44" y="68">10</text><text x="58" y="68">11</text><text x="70" y="68">12</text>
    </g>
    <!-- Green check on a day -->
    <circle cx="30" cy="51" r="7" fill="url(#checkmark)" opacity="0.8"/>
    <polyline points="26,51 29,54 35,48" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
