<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="wood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A1887F"/>
      <stop offset="30%" style="stop-color:#8D6E63"/>
      <stop offset="70%" style="stop-color:#A1887F"/>
      <stop offset="100%" style="stop-color:#795548"/>
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#CFD8DC"/>
      <stop offset="40%" style="stop-color:#90A4AE"/>
      <stop offset="100%" style="stop-color:#607D8B"/>
    </linearGradient>
    <linearGradient id="metal2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#B0BEC5"/>
      <stop offset="100%" style="stop-color:#546E7A"/>
    </linearGradient>
    <linearGradient id="bucket_body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4FC3F7"/>
      <stop offset="100%" style="stop-color:#0277BD"/>
    </linearGradient>
    <linearGradient id="tape" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF176"/>
      <stop offset="100%" style="stop-color:#F9A825"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#00000040"/>
    </filter>
  </defs>

  <!-- Ground -->
  <ellipse cx="128" cy="232" rx="105" ry="16" fill="#D7CCC8" opacity="0.5"/>

  <!-- Pickaxe (background, crossed) -->
  <g filter="url(#shadow)" transform="rotate(-35, 128, 128)">
    <!-- Handle -->
    <rect x="120" y="30" width="12" height="170" rx="5" fill="url(#wood)" stroke="#5D4037" stroke-width="1.5"/>
    <!-- Metal head -->
    <path d="M 80 45 Q 85 25, 126 30 L 126 48 Q 95 42, 85 50 Z" fill="url(#metal)" stroke="#455A64" stroke-width="2"/>
    <path d="M 170 45 Q 165 25, 126 30 L 126 48 Q 155 42, 165 50 Z" fill="url(#metal)" stroke="#455A64" stroke-width="2"/>
  </g>

  <!-- Trowel (foreground) -->
  <g filter="url(#shadow)" transform="rotate(25, 128, 128) translate(10, -10)">
    <!-- Handle -->
    <rect x="118" y="120" width="14" height="90" rx="6" fill="url(#wood)" stroke="#5D4037" stroke-width="1.5"/>
    <!-- Metal connector -->
    <rect x="114" y="115" width="22" height="15" rx="3" fill="url(#metal2)" stroke="#455A64" stroke-width="1.5"/>
    <!-- Blade -->
    <path d="M 105 115 Q 100 70, 125 40 Q 150 70, 145 115 Z" fill="url(#metal)" stroke="#455A64" stroke-width="2"/>
    <!-- Blade shine -->
    <path d="M 115 100 Q 118 65, 125 50" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Measuring tape (bottom right) -->
  <g filter="url(#shadow)" transform="translate(158, 155)">
    <rect x="0" y="0" width="55" height="55" rx="10" fill="url(#tape)" stroke="#F57F17" stroke-width="2"/>
    <circle cx="27" cy="27" r="16" fill="#FFF8E1" stroke="#F57F17" stroke-width="1.5"/>
    <text x="27" y="32" text-anchor="middle" fill="#E65100" font-size="13" font-weight="bold" font-family="Arial">m</text>
    <!-- Tape pull -->
    <rect x="43" y="22" width="20" height="10" rx="3" fill="#FFEE58" stroke="#F57F17" stroke-width="1"/>
    <!-- Tick marks on tape -->
    <line x1="48" y1="24" x2="48" y2="30" stroke="#E65100" stroke-width="1"/>
    <line x1="53" y1="24" x2="53" y2="28" stroke="#E65100" stroke-width="0.8"/>
    <line x1="58" y1="24" x2="58" y2="30" stroke="#E65100" stroke-width="1"/>
  </g>
</svg>
