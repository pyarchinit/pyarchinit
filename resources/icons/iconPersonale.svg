<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="person1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8A65"/>
      <stop offset="100%" style="stop-color:#E64A19"/>
    </linearGradient>
    <linearGradient id="person2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4FC3F7"/>
      <stop offset="100%" style="stop-color:#0277BD"/>
    </linearGradient>
    <linearGradient id="person3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81C784"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
    <linearGradient id="skin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFCC80"/>
      <stop offset="100%" style="stop-color:#FFB74D"/>
    </linearGradient>
    <linearGradient id="badge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF9C4"/>
      <stop offset="100%" style="stop-color:#FDD835"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#00000040"/>
    </filter>
  </defs>

  <!-- Ground -->
  <ellipse cx="128" cy="230" rx="105" ry="16" fill="#D7CCC8" opacity="0.5"/>

  <!-- Back person (green) -->
  <g filter="url(#shadow)" transform="translate(145, 20) scale(0.85)">
    <circle cx="90" cy="55" r="28" fill="url(#skin)" stroke="#F57C00" stroke-width="2"/>
    <path d="M 55 100 Q 55 85, 90 80 Q 125 85, 125 100 L 130 175 Q 130 185, 120 185 L 60 185 Q 50 185, 50 175 Z" fill="url(#person3)" stroke="#1B5E20" stroke-width="2"/>
    <!-- Eyes -->
    <circle cx="80" cy="52" r="3" fill="#4E342E"/>
    <circle cx="100" cy="52" r="3" fill="#4E342E"/>
    <!-- Smile -->
    <path d="M 80 65 Q 90 73, 100 65" fill="none" stroke="#4E342E" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Back person (blue) -->
  <g filter="url(#shadow)" transform="translate(-15, 20) scale(0.85)">
    <circle cx="90" cy="55" r="28" fill="url(#skin)" stroke="#F57C00" stroke-width="2"/>
    <path d="M 55 100 Q 55 85, 90 80 Q 125 85, 125 100 L 130 175 Q 130 185, 120 185 L 60 185 Q 50 185, 50 175 Z" fill="url(#person2)" stroke="#01579B" stroke-width="2"/>
    <circle cx="80" cy="52" r="3" fill="#4E342E"/>
    <circle cx="100" cy="52" r="3" fill="#4E342E"/>
    <path d="M 80 65 Q 90 73, 100 65" fill="none" stroke="#4E342E" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Front person (orange, main) -->
  <g filter="url(#shadow)" transform="translate(60, 35)">
    <circle cx="68" cy="50" r="32" fill="url(#skin)" stroke="#E65100" stroke-width="2"/>
    <path d="M 28 100 Q 28 82, 68 75 Q 108 82, 108 100 L 115 195 Q 115 205, 105 205 L 31 205 Q 21 205, 21 195 Z" fill="url(#person1)" stroke="#BF360C" stroke-width="2"/>
    <!-- Eyes -->
    <circle cx="56" cy="46" r="4" fill="#3E2723"/>
    <circle cx="80" cy="46" r="4" fill="#3E2723"/>
    <!-- Eye shine -->
    <circle cx="57.5" cy="44.5" r="1.5" fill="white"/>
    <circle cx="81.5" cy="44.5" r="1.5" fill="white"/>
    <!-- Smile -->
    <path d="M 55 60 Q 68 72, 81 60" fill="none" stroke="#4E342E" stroke-width="2.5" stroke-linecap="round"/>
    <!-- ID Badge -->
    <rect x="48" y="105" width="40" height="28" rx="4" fill="url(#badge)" stroke="#F9A825" stroke-width="1.5"/>
    <rect x="55" y="112" width="26" height="3" rx="1" fill="#FF8F00"/>
    <rect x="55" y="118" width="18" height="3" rx="1" fill="#FF8F00"/>
    <rect x="55" y="124" width="22" height="3" rx="1" fill="#FF8F00"/>
  </g>
</svg>
